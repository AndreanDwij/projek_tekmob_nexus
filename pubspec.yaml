name: ecolife
description: "EcoLife - Aplikasi Pelaporan Lingkungan, Komunitas, dan Pemantauan Jejak Karbon"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # Firebase
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.5
  firebase_storage: ^12.4.1
  firebase_messaging: ^15.2.1

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.3.5

  # Maps
  google_maps_flutter: ^2.12.0
  geolocator: ^13.0.2
  geocoding: ^3.0.0

  # Camera & Image
  image_picker: ^1.1.2

  # UI
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.17
  intl: ^0.19.0
  lottie: ^3.3.1
  fl_chart: ^0.70.2
  flutter_animate: ^4.5.2
  url_launcher: ^6.3.1

  # Utilities
  uuid: ^4.5.1
  equatable: ^2.0.7
  json_annotation: ^4.9.0
  connectivity_plus: ^6.1.4
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  json_serializable: ^6.9.4
  riverpod_generator: ^2.6.3
  riverpod_lint: ^2.6.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/illustrations/
    - assets/animations/
